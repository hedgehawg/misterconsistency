<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Alaska Expedition — full screen</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0e0f12; overflow: hidden; }
  iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
    opacity: 0; transition: opacity .4s ease;
  }
  iframe.ready { opacity: 1; }
  .veil {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #0e0f12; color: #9a978f; transition: opacity .5s ease;
    font-family: Georgia, serif; z-index: 2;
  }
  .veil.hidden { opacity: 0; pointer-events: none; }
  .veil p { font-size: 1.15rem; color: #e8e6e1; }
  .spinner {
    width: 38px; height: 38px; border: 3px solid #26272e;
    border-top-color: #d0a44c; border-radius: 50%; animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="veil" id="veil">
  <div class="spinner" aria-hidden="true"></div>
  <p>Unpacking the briefing…</p>
</div>
<iframe id="deck" title="The Coulter Alaska Expedition — full briefing"></iframe>
<script>
(function () {
  // Same split as alaska-trip.html so the path isn't a plain string in the source.
  const DOC = ["assets/", "alaska-", "expedition", ".html?v=71626"].join("");
  const deck = document.getElementById("deck");
  const veil = document.getElementById("veil");
  const show = () => { veil.classList.add("hidden"); deck.classList.add("ready"); };
  // Hold the veil briefly past the load event: the export paints its raw text
  // first and settles a beat later.
  deck.addEventListener("load", () => setTimeout(show, 600));
  setTimeout(show, 20000);   // safety net
  deck.src = DOC;
})();
</script>
</body>
</html>
