<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gattman's World — the map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; background: #aad3df; }
  .gm-face { border-radius: 50%; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.45); }
  .gm-cluster { position: relative; }
  .gm-cluster img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #fff;
    box-shadow: 0 1px 5px rgba(0,0,0,.5); display: block; }
  .gm-cluster .cnt {
    position: absolute; right: -7px; top: -6px; min-width: 20px; height: 20px;
    border-radius: 10px; background: #0e0f12; color: #d0a44c; font: 600 11px/20px Inter, system-ui, sans-serif;
    text-align: center; padding: 0 4px; box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  /* dimmed groups when a face is selected in the legend */
  .leaflet-pane.gm-dim { filter: grayscale(1) opacity(.3); }
  /* legend — tight box, parked over the South Atlantic on the opening view */
  .gm-legend {
    position: absolute; left: 62%; bottom: 7%; z-index: 800;
    display: flex; flex-direction: column; gap: 4px; padding: 7px 9px;
    background: rgba(14,15,18,.85); backdrop-filter: blur(6px);
    border: 1px solid #26272e; border-radius: 9px; user-select: none;
  }
  .gm-legend button {
    display: inline-flex; align-items: center; gap: 7px; border: 0; background: none;
    padding: 2px 3px; margin: 0; color: #e8e6e1; font: 500 12.5px/1 Inter, system-ui, sans-serif;
    cursor: pointer; border-radius: 6px;
  }
  .gm-legend button:hover { background: rgba(255,255,255,.08); }
  .gm-legend button img { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #26272e; }
  .gm-legend button.off { opacity: .35; }
  .gm-legend .hint { color: #9a978f; font: italic 10px/1.2 Georgia, serif; text-align: center; margin-top: 2px; }
  @media (max-width: 640px) { .gm-legend { left: 10px; bottom: 24px; } }
  /* popups */
  .leaflet-popup-content { font: 13px/1.5 Inter, system-ui, sans-serif; }
  .gm-pop b { font-size: 14px; }
  .gm-pop .tag { display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 8px;
    font-size: 10.5px; font-weight: 600; vertical-align: 1px; }
  .gm-pop .tag.yes { background: #e8f2e4; color: #2c6b2f; }
  .gm-pop .tag.skip { background: #f4e9e7; color: #90372c; }
  .gm-pop .tag.closed { background: #ececf2; color: #4a4a5a; }
  .gm-pop .meta { color: #777; font-size: 11.5px; margin: 2px 0 5px; }
  .gm-pop .th { font-style: italic; color: #333; }
</style>
</head>
<body>
<div id="map"></div>
<div class="gm-legend" id="legend">
  <button data-g="yes"><img src="gattman-yes.png" alt="">Yes</button>
  <button data-g="skip"><img src="gattman-skip.png" alt="">Skip</button>
  <button data-g="closed"><img src="gattman-closed.png" alt="">Now closed</button>
  <div class="hint">click a face to filter</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="gattman-places.js"></script>
<script>
(function () {
  const PLACES = window.GATTMAN_PLACES || [];
  const GROUPS = ["yes", "skip", "closed"];
  const FACE = { yes: "gattman-yes.png", skip: "gattman-skip.png", closed: "gattman-closed.png" };
  const LABEL = { yes: "Yes", skip: "Skip", closed: "Now closed" };

  const map = L.map("map", { worldCopyJump: true, zoomControl: true });
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  const esc = t => { const d = document.createElement("div"); d.textContent = t || ""; return d.innerHTML; };
  const icons = {}, layers = {};
  GROUPS.forEach(g => {
    map.createPane("pane-" + g);          // markers
    map.createPane("cpane-" + g);         // cluster bubbles
    map.getPane("pane-" + g).style.zIndex = 620;
    map.getPane("cpane-" + g).style.zIndex = 640;
    icons[g] = L.icon({ iconUrl: FACE[g], iconSize: [30, 30], iconAnchor: [15, 15],
                        popupAnchor: [0, -14], className: "gm-face" });
    layers[g] = L.markerClusterGroup({
      clusterPane: "cpane-" + g,
      chunkedLoading: true,
      maxClusterRadius: 46,
      spiderfyOnMaxZoom: true,
      iconCreateFunction: c => L.divIcon({
        className: "gm-cluster",
        html: '<img src="' + FACE[g] + '" alt=""><span class="cnt">' + c.getChildCount() + "</span>",
        iconSize: [38, 38], iconAnchor: [19, 19]
      })
    });
  });

  const bounds = [];
  PLACES.forEach(p => {
    if (!layers[p.g]) return;             // "other" stays off the map, matching Google's view
    const m = L.marker([p.lat, p.lng], { icon: icons[p.g], pane: "pane-" + p.g, title: p.n });
    const meta = [p.t, p.geo].filter(Boolean).join(" · ");
    m.bindPopup('<div class="gm-pop"><b>' + esc(p.n) + '</b><span class="tag ' + p.g + '">' +
      LABEL[p.g] + "</span>" + (meta ? '<div class="meta">' + esc(meta) + "</div>" : "") +
      (p.th ? '<div class="th">' + esc(p.th) + "</div>" : "") + "</div>", { maxWidth: 300 });
    layers[p.g].addLayer(m);
    bounds.push([p.lat, p.lng]);
  });
  GROUPS.forEach(g => map.addLayer(layers[g]));
  map.fitBounds(bounds, { padding: [20, 20] });

  // legend filtering: click a face -> that group stays, the rest go gray
  let active = null;
  const legend = document.getElementById("legend");
  legend.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      const g = btn.dataset.g;
      active = (active === g) ? null : g;
      GROUPS.forEach(k => {
        const dim = active !== null && k !== active;
        map.getPane("pane-" + k).classList.toggle("gm-dim", dim);
        map.getPane("cpane-" + k).classList.toggle("gm-dim", dim);
        legend.querySelector('[data-g="' + k + '"]').classList.toggle("off", dim);
      });
    });
  });
})();
</script>
</body>
</html>
